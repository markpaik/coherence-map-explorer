<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050510" />
    <meta
      name="description"
      content="Explore every Common Core math standard and every connection between them as a 3D constellation"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Canonical + social. The orchestrator swaps the placeholder host post-deploy. -->
    <link rel="canonical" href="https://coherence-map-explorer.example/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Coherence Map Explorer" />
    <meta
      property="og:description"
      content="Explore every Common Core math standard and every connection between them as a 3D constellation"
    />
    <meta property="og:image" content="https://coherence-map-explorer.example/og.png" />
    <meta property="og:url" content="https://coherence-map-explorer.example/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Coherence Map Explorer" />
    <meta
      name="twitter:description"
      content="Explore every Common Core math standard and every connection between them as a 3D constellation"
    />
    <meta name="twitter:image" content="https://coherence-map-explorer.example/og.png" />
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-600-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Coherence Map Explorer</title>
  </head>
  <body>
    <noscript>
      Coherence Map Explorer needs JavaScript and a WebGL-capable browser to
      render the 3D standards graph.
    </noscript>

    <!-- WebGL canvas mounts here (aria-hidden; the DOM UI is the accessible surface) -->
    <div id="scene"></div>

    <!-- Title block, top-left -->
    <header class="title-block">
      <p class="brand">Coherence Map Explorer</p>
      <h1 class="headline">Every standard.<br />Every connection.</h1>
      <p class="subline">Common Core mathematics, Kindergarten through high school, as one living structure.</p>
      <p class="statline">480 standards &middot; 899 connections &middot; K&ndash;High School</p>
    </header>

    <!-- Search rail, bottom third — visual placeholder; Phase 3 wires it -->
    <div id="search-rail" class="search-rail" aria-hidden="true">
      <div id="search-bar" class="search-bar">
        <svg class="search-icon" viewBox="0 0 20 20" width="16" height="16" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6" />
          <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Find a standard, e.g. 4.NF.B.3"
          readonly
          tabindex="-1"
        />
        <kbd class="search-hint">/</kbd>
      </div>
      <button id="tour-btn" class="ghost-btn" type="button" tabindex="-1">Show me around</button>
    </div>

    <!-- Polite live region: narrates focus changes (the canvas is aria-hidden;
         the detail panel + this region are the accessible mirror). -->
    <div id="aria-live" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <!-- Navigation directions, bottom-right (dims after first camera use) -->
    <p id="nav-hints" class="nav-hints" aria-hidden="true">
      drag <span>orbit</span> &middot; scroll <span>zoom</span> &middot; right-drag
      <span>pan</span>
    </p>

    <!-- Boot veil: scene fades in from black over 900ms on first render -->
    <div id="veil"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
