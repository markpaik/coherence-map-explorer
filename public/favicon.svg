    <line x1="12" y1="44" x2="30" y2="30" stroke="#c08a1e"/>
    <line x1="30" y1="30" x2="52" y2="18" stroke="#8b5cf6"/>
    <line x1="30" y1="30" x2="46" y2="46" stroke="#1c9fbb"/>
    <line x1="12" y1="44" x2="46" y2="46" stroke="#de5a85"/>
  </g>
  <circle cx="12" cy="44" r="5" fill="#c08a1e"/>
  <circle cx="30" cy="30" r="6.5" fill="#8b5cf6"/>
  <circle cx="52" cy="18" r="4.5" fill="#8b5cf6"/>
  <circle cx="46" cy="46" r="5" fill="#1c9fbb"/>
  <circle cx="20" cy="16" r="3.5" fill="#de5a85"/>
