<svg xmlns="http://www.w3.org/2000/svg" width="1960" height="800" viewBox="0 0 1960 800">
  <defs>
    <radialGradient id="env" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#9a7df0" stop-opacity="0"/>
      <stop offset="92%" stop-color="#9a7df0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9a7df0" stop-opacity="0.02"/>
    </radialGradient>
    <linearGradient id="sap" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e8b34b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e8b34b" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1960" height="800" fill="#0a0a16"/>
  <text x="40" y="52" font-family="ui-monospace, monospace" font-size="21" fill="#e8e6f6" letter-spacing="0.08em">THE FAMILY MEMBRANE · one body, three renderings · concept board from the real 6.RP.A.3 neighborhood</text>
  <text x="40" y="78" font-family="ui-monospace, monospace" font-size="13.5" fill="#8a86b8" letter-spacing="0.04em">Axis 3 made spatial: connections engage the family body, then resolve to the member they truly touch. Verified wiring; illustrative geometry.</text>

  <!-- ================= PANEL A · CONSTELLATION: the system ================= -->
  <line x1="660" y1="100" x2="660" y2="760" stroke="#232145" stroke-width="1"/>
  <text x="40" y="126" font-family="ui-monospace, monospace" font-size="15" fill="#c8c4e8" letter-spacing="0.1em">CONSTELLATION · THE SYSTEM</text>
  <text x="40" y="148" font-family="ui-monospace, monospace" font-size="12" fill="#8a86b8">planet + moons; arrivals are captured, then dock at their moon; at distance the family is one light</text>

  <!-- envelope -->
  <circle cx="345" cy="430" r="152" fill="url(#env)"/>
  <circle cx="345" cy="430" r="152" fill="none" stroke="#9a7df0" stroke-opacity="0.22" stroke-width="0.8" stroke-dasharray="1 5"/>
  <!-- orbit ring -->
  <circle cx="345" cy="430" r="72" fill="none" stroke="#6f68b0" stroke-opacity="0.3" stroke-width="0.7" stroke-dasharray="2 6"/>

  <!-- inbound arcs: capture bend into the envelope, dock at moons -->
  <path d="M100,610 C190,570 240,510 280,462" fill="none" stroke="#4dc8c0" stroke-width="1.6" stroke-opacity="0.75"/>
  <path d="M280,462 C292,447 294,438 296,432" fill="none" stroke="#4dc8c0" stroke-width="2.4" stroke-opacity="0.95"/>
  <path d="M120,330 C190,352 240,376 272,398" fill="none" stroke="#e8b34b" stroke-width="1.6" stroke-opacity="0.75"/>
  <path d="M272,398 C285,408 291,416 295,424" fill="none" stroke="#e8b34b" stroke-width="2.4" stroke-opacity="0.95"/>
  <path d="M150,205 C240,240 300,280 352,336" fill="none" stroke="#e8b34b" stroke-width="1.6" stroke-opacity="0.75"/>
  <path d="M352,336 C372,342 385,350 391,357" fill="none" stroke="#e8b34b" stroke-width="2.4" stroke-opacity="0.95"/>
  <path d="M150,205 C260,265 330,330 384,398" fill="none" stroke="#e8b34b" stroke-width="1.2" stroke-opacity="0.55"/>
  <path d="M150,205 C230,310 260,390 300,470" fill="none" stroke="#e8b34b" stroke-width="1.2" stroke-opacity="0.55"/>

  <!-- outbound: direct, from the planet itself -->
  <path d="M366,424 C460,392 520,360 585,330" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M367,432 C470,438 530,442 596,448" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M364,440 C455,490 520,530 588,570" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <!-- child outbound leaves the system too -->
  <path d="M398,362 C470,300 520,255 578,215" fill="none" stroke="#9a7df0" stroke-width="1.3" stroke-opacity="0.7"/>

  <!-- moons -->
  <circle cx="297" cy="428" r="9" fill="#e8b34b"/>
  <text x="278" y="418" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.a</text>
  <circle cx="394" cy="360" r="9" fill="#e8b34b"/>
  <text x="404" y="352" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.b</text>
  <circle cx="404" cy="492" r="9" fill="#e8b34b"/>
  <text x="414" y="504" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.c</text>
  <circle cx="300" cy="472" r="9" fill="#e8b34b"/>
  <text x="278" y="486" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.d</text>
  <!-- planet -->
  <circle cx="345" cy="430" r="21" fill="#e8b34b"/>
  <circle cx="345" cy="430" r="21" fill="none" stroke="#0a0a16" stroke-width="1"/>
  <text x="322" y="404" font-family="ui-monospace, monospace" font-size="11.5" fill="#e8e6f6">6.RP.A.3</text>

  <!-- neighbors -->
  <circle cx="100" cy="610" r="10" fill="#4dc8c0"/><text x="60" y="634" font-family="ui-monospace, monospace" font-size="10.5" fill="#8fb8b4">5.G.A.2</text>
  <circle cx="120" cy="330" r="10" fill="#e8b34b"/><text x="76" y="316" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.1</text>
  <circle cx="150" cy="205" r="10" fill="#e8b34b"/><text x="106" y="190" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.2</text>
  <circle cx="585" cy="330" r="10" fill="#e8b34b"/><text x="540" y="315" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.2</text>
  <circle cx="596" cy="448" r="10" fill="#e8b34b"/><text x="550" y="472" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.3</text>
  <circle cx="588" cy="570" r="10" fill="#e8b34b"/><text x="545" y="594" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">N-Q.A.1</text>
  <circle cx="578" cy="215" r="9" fill="#9a7df0"/><text x="530" y="200" font-family="ui-monospace, monospace" font-size="10.5" fill="#a89ad8">6.EE.C.9</text>

  <text x="40" y="740" font-family="ui-monospace, monospace" font-size="11.5" fill="#6f6a9a">arcs brighten as they cross the membrane: arrived at the system, docked at the moon</text>

  <!-- ================= PANEL B · ASCENT: the tree ================= -->
  <line x1="1310" y1="100" x2="1310" y2="760" stroke="#232145" stroke-width="1"/>
  <text x="700" y="126" font-family="ui-monospace, monospace" font-size="15" fill="#c8c4e8" letter-spacing="0.1em">ASCENT · THE TREE</text>
  <text x="700" y="148" font-family="ui-monospace, monospace" font-size="12" fill="#8a86b8">light entering a rootlet climbs the conduit into the trunk; inherited flow and direct arcs are different textures</text>

  <!-- grade shelf hints -->
  <text x="705" y="625" font-family="ui-monospace, monospace" font-size="22" fill="#2e2b56">5</text>
  <text x="705" y="445" font-family="ui-monospace, monospace" font-size="22" fill="#2e2b56">6</text>
  <text x="705" y="235" font-family="ui-monospace, monospace" font-size="22" fill="#2e2b56">7</text>

  <!-- conduits: children feed the trunk (sap gradient, thick, no comets) -->
  <path d="M985,505 C990,478 998,458 1010,440" fill="none" stroke="url(#sap)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1015,516 C1017,492 1019,466 1020,442" fill="none" stroke="url(#sap)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1048,512 C1042,488 1034,462 1027,441" fill="none" stroke="url(#sap)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1078,502 C1063,478 1046,456 1032,438" fill="none" stroke="url(#sap)" stroke-width="6" stroke-linecap="round"/>

  <!-- inbound ribbons land on children (rootlets) -->
  <path d="M790,640 C860,600 930,555 978,512" fill="none" stroke="#4dc8c0" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M870,560 C910,542 950,527 976,514" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M905,585 C945,565 990,543 1012,522" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M905,585 C960,568 1010,548 1044,518" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M905,585 C975,575 1040,548 1074,508" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- direct arcs from the trunk upward -->
  <path d="M1026,412 C1060,352 1100,290 1150,235" fill="none" stroke="#e8b34b" stroke-width="2" stroke-opacity="0.9"/>
  <path d="M1030,415 C1090,375 1160,330 1225,290" fill="none" stroke="#e8b34b" stroke-width="2" stroke-opacity="0.9"/>

  <!-- family -->
  <circle cx="1022" cy="425" r="16" fill="#e8b34b"/>
  <text x="1000" y="400" font-family="ui-monospace, monospace" font-size="11.5" fill="#e8e6f6">6.RP.A.3</text>
  <circle cx="982" cy="510" r="8" fill="#e8b34b"/><text x="960" y="530" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.a</text>
  <circle cx="1015" cy="520" r="8" fill="#e8b34b"/><text x="1006" y="540" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.b</text>
  <circle cx="1049" cy="516" r="8" fill="#e8b34b"/><text x="1046" y="536" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.c</text>
  <circle cx="1080" cy="505" r="8" fill="#e8b34b"/><text x="1084" y="524" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.d</text>

  <!-- neighbors -->
  <circle cx="790" cy="640" r="10" fill="#4dc8c0"/><text x="748" y="664" font-family="ui-monospace, monospace" font-size="10.5" fill="#8fb8b4">5.G.A.2</text>
  <circle cx="870" cy="560" r="10" fill="#e8b34b"/><text x="812" y="550" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.1</text>
  <circle cx="905" cy="585" r="10" fill="#e8b34b"/><text x="852" y="608" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.2</text>
  <circle cx="1150" cy="235" r="10" fill="#e8b34b"/><text x="1108" y="220" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.2</text>
  <circle cx="1225" cy="290" r="10" fill="#e8b34b"/><text x="1186" y="275" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.3</text>

  <text x="700" y="740" font-family="ui-monospace, monospace" font-size="11.5" fill="#6f6a9a">the conduit lights whenever a rootlet's edge lights: inherited standing made visible, never a fake edge</text>

  <!-- ================= PANEL C · BLUEPRINT: the chip ================= -->
  <text x="1350" y="126" font-family="ui-monospace, monospace" font-size="15" fill="#c8c4e8" letter-spacing="0.1em">BLUEPRINT · THE CHIP</text>
  <text x="1350" y="148" font-family="ui-monospace, monospace" font-size="12" fill="#8a86b8">the family is a package; traces land on labeled pins; no one thinks a wire to pin b missed the chip</text>

  <!-- package -->
  <rect x="1600" y="300" width="170" height="240" rx="14" fill="#9a7df0" fill-opacity="0.05" stroke="#9a7df0" stroke-opacity="0.4" stroke-width="1.2"/>
  <text x="1622" y="332" font-family="ui-monospace, monospace" font-size="12.5" fill="#e8e6f6">6.RP.A.3</text>
  <circle cx="1685" cy="352" r="12" fill="#e8b34b"/>

  <!-- pins (children) on the left edge -->
  <rect x="1594" y="390" width="12" height="12" fill="#e8b34b"/><text x="1614" y="400" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.a</text>
  <rect x="1594" y="430" width="12" height="12" fill="#e8b34b"/><text x="1614" y="440" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.b</text>
  <rect x="1594" y="470" width="12" height="12" fill="#e8b34b"/><text x="1614" y="480" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.c</text>
  <rect x="1594" y="510" width="12" height="12" fill="#e8b34b"/><text x="1614" y="520" font-family="ui-monospace, monospace" font-size="10" fill="#b8b4d8">.d</text>

  <!-- traces in (orthogonal, circuit-style) -->
  <path d="M1450,396 L1594,396" fill="none" stroke="#4dc8c0" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M1436,320 L1500,320 L1500,392 L1594,392" fill="none" stroke="#e8b34b" stroke-width="1.6" stroke-opacity="0.8"/>
  <path d="M1446,470 L1520,470 L1520,436 L1594,436" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.75"/>
  <path d="M1446,470 L1520,470 L1520,476 L1594,476" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.75"/>
  <path d="M1446,470 L1520,470 L1520,516 L1594,516" fill="none" stroke="#e8b34b" stroke-width="1.5" stroke-opacity="0.75"/>

  <!-- traces out (right edge: parent pins high, child pin low) -->
  <path d="M1770,340 L1860,340" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M1770,368 L1830,368 L1830,405 L1860,405" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M1770,396 L1820,396 L1820,468 L1860,468" fill="none" stroke="#e8b34b" stroke-width="1.8" stroke-opacity="0.85"/>
  <path d="M1770,436 L1840,436 L1840,536 L1860,536" fill="none" stroke="#9a7df0" stroke-width="1.4" stroke-opacity="0.75"/>

  <!-- neighbors -->
  <circle cx="1450" cy="396" r="9" fill="#4dc8c0"/><text x="1398" y="386" font-family="ui-monospace, monospace" font-size="10.5" fill="#8fb8b4">5.G.A.2</text>
  <circle cx="1436" cy="320" r="9" fill="#e8b34b"/><text x="1382" y="310" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.1</text>
  <circle cx="1446" cy="470" r="9" fill="#e8b34b"/><text x="1390" y="494" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">6.RP.A.2</text>
  <circle cx="1872" cy="340" r="9" fill="#e8b34b"/><text x="1884" y="344" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.2</text>
  <circle cx="1872" cy="405" r="9" fill="#e8b34b"/><text x="1884" y="409" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">7.RP.A.3</text>
  <circle cx="1872" cy="468" r="9" fill="#e8b34b"/><text x="1884" y="472" font-family="ui-monospace, monospace" font-size="10.5" fill="#c8a86a">N-Q.A.1</text>
  <circle cx="1872" cy="536" r="9" fill="#9a7df0"/><text x="1884" y="540" font-family="ui-monospace, monospace" font-size="10.5" fill="#a89ad8">6.EE.B.7</text>

  <text x="1350" y="740" font-family="ui-monospace, monospace" font-size="11.5" fill="#6f6a9a">members stay contiguous in their column; the package outline is the membrane, printed not glowing</text>
</svg>
